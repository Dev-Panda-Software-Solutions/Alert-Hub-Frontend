<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Arc gradients -->
    <linearGradient id="gL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <!-- Circle fills -->
    <linearGradient id="cT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="cBL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="cBR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="bell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Connecting arcs — drawn first (behind circles) -->
  <!-- Left arc: top → bottom-left -->
  <path d="M 47 20 Q 18 44 24 72" stroke="url(#gL)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Right arc: top → bottom-right -->
  <path d="M 53 20 Q 82 44 76 72" stroke="url(#gR)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Bottom arc: bottom-left → bottom-right -->
  <path d="M 29 78 Q 50 90 71 78" stroke="url(#gB)" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Top circle — Family -->
  <circle cx="50" cy="14" r="14" fill="url(#cT)"/>
  <!-- People icon: 2 adults + child -->
  <circle cx="50" cy="10" r="3" fill="white"/>
  <path d="M43 20 Q43 15 50 15 Q57 15 57 20" fill="white"/>
  <circle cx="43" cy="11" r="2.2" fill="white" opacity="0.75"/>
  <circle cx="57" cy="11" r="2.2" fill="white" opacity="0.75"/>

  <!-- Bottom-left circle — Business -->
  <circle cx="24" cy="78" r="14" fill="url(#cBL)"/>
  <!-- Briefcase icon -->
  <rect x="17" y="76" width="14" height="9" rx="1.5" fill="white"/>
  <path d="M21 76 v-2 a3 3 0 0 1 6 0 v2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="81" x2="31" y2="81" stroke="url(#cBL)" stroke-width="1.2"/>

  <!-- Bottom-right circle — Finance -->
  <circle cx="76" cy="78" r="14" fill="url(#cBR)"/>
  <!-- Bar chart icon -->
  <rect x="69" y="78" width="3.5" height="7" rx="1" fill="white"/>
  <rect x="74" y="74" width="3.5" height="11" rx="1" fill="white"/>
  <rect x="79" y="76" width="3.5" height="9" rx="1" fill="white"/>

  <!-- Central bell -->
  <path d="M50 38 C44 38 40 43 40 49 L40 55 L60 55 L60 49 C60 43 56 38 50 38 Z" fill="url(#bell)"/>
  <circle cx="50" cy="38" r="2.5" fill="url(#bell)"/>
  <path d="M46 55 Q46 59 50 59 Q54 59 54 55" fill="url(#bell)"/>
  <!-- Sound waves -->
  <path d="M36 47 Q34 50 36 53" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M64 47 Q66 50 64 53" stroke="#818cf8" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
